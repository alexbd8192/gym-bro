services:

  # ── Frontend (React + nginx) ────────────────────────────────────────────────
  # nginx serves the compiled React app and proxies /api/ and /_/ to PocketBase
  frontend:
    build: .
    container_name: gymbro
    restart: always
    depends_on:
      pocketbase:
        condition: service_healthy
    networks:
      - gymbro
    ports:
      - "7654:80"
    deploy:
      resources:
        limits:
          memory: 256M

  # ── PocketBase (database + auth API) ────────────────────────────────────────
  # NOT exposed to host — only reachable from the frontend container via nginx proxy
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: gymbro-pb
    restart: always
    volumes:
      - /media/docker_appdata/gymbro/pb_data:/pb/pb_data        # persistent DB (never in git)
      - ./pb_migrations:/pb/pb_migrations                        # schema files (from repo)
    networks:
      - gymbro
    ports:
      - "8090:8090"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8090/api/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  gymbro:
    name: gymbro
    internal: false  # frontend needs to be reachable from outside (Tailscale)
